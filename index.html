<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Builder</title>

<link rel="stylesheet" href="style.css">

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>

<div class="container">

<!-- FORM -->
<div class="form">
<h2>Resume Builder</h2>

<input id="f-name" placeholder="Full Name">
<input id="f-role" placeholder="Role">
<input id="f-email" placeholder="Email">
<input id="f-phone" placeholder="Phone">

<textarea id="f-profile" placeholder="Profile"></textarea>
<textarea id="f-experience" placeholder="Experience"></textarea>
<textarea id="f-education" placeholder="Education"></textarea>

<textarea id="f-projects" placeholder="Projects"></textarea>
<textarea id="f-internship" placeholder="Internship"></textarea>
<textarea id="f-skills" placeholder="Skills"></textarea>
<textarea id="f-language" placeholder="Languages"></textarea>
<textarea id="f-certification" placeholder="Certifications"></textarea>

<input id="f-dob" placeholder="DOB">
<input id="f-gender" placeholder="Gender">
<input id="f-nationality" placeholder="Nationality">
<textarea id="f-address" placeholder="Address"></textarea>

<button onclick="downloadPDF()">Download Resume</button>
</div>

<!-- PREVIEW -->
<div class="preview-area">
<div class="resume" id="resume">

<h1 id="p-name">YOUR NAME</h1>
<p id="p-role"></p>
<p id="p-email"></p>
<p id="p-phone"></p>

<div class="section">
<h3>PROFILE</h3>
<p id="p-profile"></p>
</div>

<div class="section">
<h3>EXPERIENCE</h3>
<p id="p-experience"></p>
</div>

<div class="section">
<h3>EDUCATION</h3>
<p id="p-education"></p>
</div>

<div class="section">
<h3>PROJECTS</h3>
<p id="p-projects"></p>
</div>

<div class="section">
<h3>INTERNSHIP</h3>
<p id="p-internship"></p>
</div>

<div class="section">
<h3>SKILLS</h3>
<p id="p-skills"></p>
</div>

<div class="section">
<h3>LANGUAGES</h3>
<p id="p-language"></p>
</div>

<div class="section">
<h3>CERTIFICATIONS</h3>
<p id="p-certification"></p>
</div>

<div class="section">
<h3>ADDITIONAL INFO</h3>
<p>DOB: <span id="p-dob"></span></p>
<p>Gender: <span id="p-gender"></span></p>
<p>Nationality: <span id="p-nationality"></span></p>
<p>Address: <span id="p-address"></span></p>
</div>

</div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
