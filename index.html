<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Builder</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<!-- FORM -->
<div class="form">
<h2>Resume Builder</h2>

<input id="name" placeholder="Full Name">
<input id="role" placeholder="Role">
<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone">

<textarea id="profile" placeholder="Professional Profile"></textarea>

<textarea id="experience" placeholder="Work Experience"></textarea>

<textarea id="education" placeholder="Education Details"></textarea>

<textarea id="projects" placeholder="Technical Projects"></textarea>
<textarea id="internship" placeholder="Internship Experience"></textarea>
<textarea id="skills" placeholder="Technical Skills"></textarea>
<textarea id="language" placeholder="Languages"></textarea>
<textarea id="certification" placeholder="Certifications"></textarea>

<input id="dob" placeholder="Date of Birth">
<input id="gender" placeholder="Gender">
<input id="nationality" placeholder="Nationality">
<textarea id="address" placeholder="Address"></textarea>

</div>

<!-- PREVIEW -->
<div class="resume" id="resume">

<h1 id="name">YOUR NAME</h1>
<p id="role">Role</p>
<p id="email">E-mail</p>
<p id="phnoe">+91 </p>

<div class="section">
<h3>PROFESSIONAL PROFILE</h3>
<p id="p-profile"></p>
</div>

<div class="section">
<h3>WORK EXPERIENCE</h3>
<p id="p-experience"></p>
</div>

<div class="section">
<h3>EDUCATION</h3>
<p id="p-educationType"></p>
<p id="p-education"></p>
</div>

<div class="section">
<h3>TECHNICAL PROJECTS</h3>
<p id="p-projects"></p>
</div>

<div class="section">
<h3>INTERNSHIP EXPERIENCE</h3>
<p id="p-internship"></p>
</div>

<div class="section">
<h3>TECHNICAL SKILLS</h3>
<p id="p-skills"></p>
</div>

<div class="section">
<h3>LANGUAGES</h3>
<p id="p-language"></p>
</div>

<div class="section">
<h3>CERTIFICATIONS</h3>
<p id="p-certification"></p>
</div>

<div class="section">
<h3>ADDITIONAL INFO</h3>
<p>DOB: <span id="p-dob"></span></p>
<p>Gender: <span id="p-gender"></span></p>
<p>Nationality: <span id="p-nationality"></span></p>
<p>Address: <span id="p-address"></span></p>
</div>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
